<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Add a Book</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="imahe/x-icon" href="img/book.ico">
    </head>
    <body>
        <header>
            <h1>Add a Book</h1>
            <nav>
                <a href="index.html">Start Menu</a>
                <a href="books.html">Books</a>
            </nav>
        </header>
        <main>
            <form class="book-form">
                <div class="form-field">
                    <label for="title">Knjiga:</label>
                    <input type="text" id="title" name="title">
                </div>              
                <div class="form-field">
                    <label for="author">Autor:</label>
                    <input type="text" id="author" name="author">
                </div>
                <div class="form-field">
                    <label for="isbn">ISBN:</label>
                    <input type="text" id="isbn" name="isbn">
                </div>               
                <button type="submit">Dodaj knjigu</button>
            </form>
        </main>
        <footer>Predrag Vuckovic 2026</footer>
        <script src="addABook.js"></script>
    </body>
</html>
